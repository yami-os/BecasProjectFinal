<div class="login-container">

  <div class="login-card">
    <h2>Iniciar Sesión</h2>

    <form (ngSubmit)="login()">

      <input 
        type="email"
        [(ngModel)]="loginData.correo"
        name="correo"
        placeholder="Correo"
        class="form-control"
        required
      >

      <input 
        type="password"
        [(ngModel)]="loginData.contra"
        name="contra"
        placeholder="Contraseña"
        class="form-control"
        required
      >

    
      <p class="error" *ngIf="errorMsg">
        {{ errorMsg }}
      </p>

      <button type="submit" class="btn-login" [disabled]="loading">
        {{ loading ? 'Ingresando...' : 'Iniciar Sesión' }}
      </button>

    </form>
  </div>

</div>
