<div class="registro-container">

  <div class="registro-card">

    <h2>Crear Cuenta</h2>

    <input [(ngModel)]="registro.nombre" placeholder="Nombre" class="form-control">

    <input [(ngModel)]="registro.correo" placeholder="Correo" class="form-control">

    <input type="password" [(ngModel)]="registro.contra" placeholder="Contraseña" class="form-control">

    <button (click)="registrar()" class="btn btn-registro">
      Registrarse
    </button>

  </div>

</div>
