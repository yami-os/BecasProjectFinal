<div class="container mt-4">
  <h2 class="text-primary">Gestión de Estudiantes</h2>

  <div class="card shadow-sm p-4 mb-4 border-0 bg-light">
    <div class="row g-3">
      <div class="col-md-2">
        <label class="form-label">Matrícula (ID)</label>
        <input type="number" class="form-control" [(ngModel)]="est.est_Id" [disabled]="editando">
      </div>
      <div class="col-md-5">
        <label class="form-label">Nombre Completo</label>
        <input type="text" class="form-control" [(ngModel)]="est.est_Nombre">
      </div>
      <div class="col-md-5">
        <label class="form-label">Carrera</label>
        <input type="text" class="form-control" [(ngModel)]="est.est_Carrera" placeholder="Ej: DSM">
      </div>
      <div class="col-md-4">
        <label class="form-label">Correo Electrónico</label>
        <input type="email" class="form-control" [(ngModel)]="est.est_Correo">
      </div>
      <div class="col-md-4">
        <label class="form-label">Teléfono</label>
        <input type="number" class="form-control" [(ngModel)]="est.est_Telefono">
      </div>
      <div class="col-md-4">
        <label class="form-label">Dirección</label>
        <input type="text" class="form-control" [(ngModel)]="est.est_Direccion">
      </div>
      <div class="col-12 text-end mt-3">
        <button class="btn btn-outline-secondary me-2" (click)="limpiar()">Limpiar</button>
        <button class="btn btn-primary" (click)="guardar()">
          {{ editando ? 'Actualizar' : 'Registrar Estudiante' }}
        </button>
      </div>
    </div>
  </div>

  <table class="table table-hover shadow-sm">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Carrera</th>
        <th>Teléfono</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let e of estudiantes">
        <td>{{ e.est_Id }}</td>
        <td>{{ e.est_Nombre }}</td>
        <td>{{ e.est_Carrera }}</td>
        <td>{{ e.est_Telefono }}</td>
        <td>
          <button class="btn btn-warning btn-sm me-2" (click)="editar(e)">Editar</button>
          <button class="btn btn-danger btn-sm" (click)="eliminar(e.est_Id)">X</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
