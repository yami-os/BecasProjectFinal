<div class="container mt-4">

  <h2 class="titulo">Panel Administrador</h2>

  <div class="card p-3 mb-4 shadow">
    <input class="form-control mb-2"
      placeholder="Tipo de beca"
      [(ngModel)]="nuevaConvocatoria.con_Tipo">

    <input class="form-control mb-2"
      type="date"
      [(ngModel)]="nuevaConvocatoria.con_Fecha">

    <button class="btn btn-success w-100" (click)="agregar()">
      Agregar
    </button>
  </div>

  <div *ngFor="let c of convocatorias" class="card mb-2 p-3 shadow-sm">

    <h5>{{ c.con_Tipo }}</h5>
    <p>{{ c.con_Fecha }}</p>

    <button class="btn btn-danger btn-sm" (click)="eliminar(c.con_Id)">
      Eliminar
    </button>

  </div>

</div>
