<h2>Convocatoria</h2>

<div>
  <label>Tipo:</label>
  <input [(ngModel)]="conv.con_Tipo" placeholder="Tipo">
  <br><br>
  <label>Fecha:</label>
  <input [(ngModel)]="conv.con_Fecha" type="date">
  <br><br>
  <button (click)="insert()">Agregar</button>
  <button (click)="update()">Actualizar</button>
  <button (click)="reset()">Limpiar</button>
</div>
<br>
<table border="1">
  <thead>
    <tr>
      <th>ID</th>
      <th>Tipo</th>
      <th>Fecha</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let c of convocatorias">
      <td>{{ c.con_Id }}</td>
      <td>{{ c.con_Tipo }}</td>
      <td>{{ c.con_Fecha }}</td>
      <td>
        <button (click)="edit(c)">Editar</button>
        <button (click)="delete(c.con_Id)">Eliminar</button>
      </td>
    </tr>
  </tbody>
</table>
