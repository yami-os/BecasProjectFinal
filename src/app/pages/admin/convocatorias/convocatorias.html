<div class="admin">

  <h2>Administrar Convocatorias</h2>

  <input
    type="text"
    [(ngModel)]="nueva.con_Tipo"
    placeholder="Tipo de convocatoria"
  >

  <input
    type="date"
    [(ngModel)]="nueva.con_Fecha"
  >

  <button type="button" (click)="agregar()">
    Agregar
  </button>

  <table>
    <thead>
      <tr>
        <th>Tipo</th>
        <th>Fecha</th>
        <th>Acciones</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let c of lista; let i = index">
        <td>{{ c.con_Tipo }}</td>
        <td>{{ c.con_Fecha | date:'yyyy-MM-dd' }}</td>
        <td>
          <button
            type="button"
            (click)="eliminar(c.con_Id || i)">
            Eliminar
          </button>
        </td>
      </tr>

      <tr *ngIf="lista.length === 0">
        <td colspan="3">
          No hay convocatorias registradas
        </td>
      </tr>
    </tbody>
  </table>

</div>
