<nav class="navbar">

  <!-- Logo -->
  <div class="logo">🎓 UTS Becas</div>

  <!-- Links -->
  <div class="nav-links">

    <a routerLink="/portada">Inicio</a>

    <a *ngIf="usuario" routerLink="/solicitar">
      Solicitar beca
    </a>

    <a *ngIf="usuario" routerLink="/mis-solicitudes">
      Mis solicitudes
    </a>

  </div>

  <!-- Acciones -->
  <div class="nav-actions">

    <!-- SIN sesión -->
    <ng-container *ngIf="!usuario">
      <button routerLink="/login" class="btn login">
        Login
      </button>

      <button routerLink="/registro" class="btn register">
        Registro
      </button>
    </ng-container>

    <!-- CON sesión -->
    <ng-container *ngIf="usuario">
      <span class="user-name">
        👤 {{ usuario.nombre || 'Usuario' }}
      </span>

      <button (click)="logout()" class="btn logout">
        Cerrar sesión
      </button>
    </ng-container>

  </div>

</nav>
